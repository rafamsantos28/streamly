<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamly+ - Sucesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #4E67B1 0%, #3d4f8a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
            padding: 20px;
        }

        .success-container {
            background-color: rgba(61, 79, 138, 0.8);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 10px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-size: 28px;
            color: #BC872E;
            margin-bottom: 15px;
        }

        .message {
            font-size: 16px;
            color: #FFFFFF;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .code-display {
            background-color: rgba(188, 135, 46, 0.2);
            border: 2px solid #BC872E;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: #BC872E;
            letter-spacing: 2px;
        }

        .status {
            background-color: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            padding: 12px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 14px;
            color: #FFFFFF;
        }

        .countdown {
            font-size: 14px;
            color: #BC872E;
            margin-top: 20px;
            font-weight: 700;
        }

        .info {
            background-color: rgba(188, 135, 46, 0.1);
            border-left: 3px solid #BC872E;
            padding: 12px;
            margin-top: 20px;
            border-radius: 3px;
            font-size: 12px;
            color: #FFFFFF;
        }

        .logo-small {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(188, 135, 46, 0.3);
        }

        .logo-small img {
            max-width: 80px;
            height: auto;
        }

        @media (max-width: 480px) {
            .success-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .success-icon {
                font-size: 60px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>

        <h1>Emparelhamento Concluído!</h1>
        <p class="message">A tua TV está agora emparelhada com a tua conta Streamly+</p>

        <div class="code-display" id="codigoDisplay">—</div>

        <div class="status">
            ✓ A TV foi autenticada com sucesso<br>
            ✓ Conta sincronizada
        </div>

        <div class="countdown">
            A redireccionar em <span id="countdown">5</span> segundos...
        </div>

        <div class="info">
            <strong>Nota:</strong> A tua TV pode agora aceder a todos os filmes da Streamly+ com a tua conta.
        </div>

        <div class="logo-small">
            <img src="logo.png" alt="Streamly+">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <script src="js/tv.js"></script>

    <script>
        // Obter o código da URL
        const urlParams = new URLSearchParams(window.location.search);
        const codigo = urlParams.get('codigo');

        if (codigo) {
            document.getElementById('codigoDisplay').textContent = codigo.toUpperCase();
        }

        // Countdown
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');

        const interval = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
